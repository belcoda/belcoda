app = 'belcoda-app-staging'
primary_region = 'fra'

[build]

[build.args]
DATABASE_URL="postgres://postgres:test@localhost/database"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  internal_port = 3000
  protocol = "tcp"
  internal = true

  [[services.ports]]
    port = 8080
  	handlers = ["http"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1