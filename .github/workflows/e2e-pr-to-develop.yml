name: E2E (PR to develop)

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  e2e:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROXIED_STAGING_DATABASE_URL }}
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          BETTER_AUTH_SECRET: dummy_secret_for_tests
          ZERO_AUTH_SECRET: dummy_zero_secret
          ZERO_UPSTREAM_DB: ${{ secrets.PROXIED_STAGING_DATABASE_URL }}
          ZERO_REPLICA_FILE: /tmp/sync-replica.db

      - name: Start database proxy and run e2e tests
        run: |
          # Start proxy to staging database
          flyctl proxy 5432 -a belcodadb-staging &
          PROXY_PID=$!
          sleep 5

          # Run tests with real database
          npm run test:e2e

          # Cleanup proxy
          kill $PROXY_PID
        env:
          DATABASE_URL: ${{ secrets.PROXIED_STAGING_DATABASE_URL }}
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          BETTER_AUTH_SECRET: dummy_secret_for_tests
          ZERO_AUTH_SECRET: dummy_zero_secret
          ZERO_UPSTREAM_DB: ${{ secrets.PROXIED_STAGING_DATABASE_URL }}
          ZERO_REPLICA_FILE: /tmp/sync-replica.db
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
