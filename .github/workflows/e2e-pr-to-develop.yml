name: E2E (PR to develop)

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  e2e:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Update npm
        run: |
          npm install -g npm@^11.10.0
          npm --version

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list --json @playwright/test | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run e2e tests against staging
        run: npm run test:e2e
        env:
          E2E_BASE_URL: 'https://staging.belcoda.com'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload CTRF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ctrf
          path: ctrf/
          retention-days: 7

      - name: Post test report to PR
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/ctrf-report.json'
          pull-request-report: true
          failed-report: true
          flaky-report: true
          pull-request: true
          overwrite-comment: true
          comment-tag: 'e2e-results'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
