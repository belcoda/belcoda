name: E2E (PR to develop)

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  e2e:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list --json @playwright/test | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run e2e tests against staging
        run: |
          # Start proxy to staging database
          flyctl proxy 5432 -a belcodadb-staging &
          PROXY_PID=$!
          sleep 5

          # Run tests
          npm run test:e2e
          TEST_EXIT=$?

          # Cleanup proxy
          kill $PROXY_PID 2>/dev/null || true

          exit $TEST_EXIT
        env:
          DATABASE_URL: ${{ secrets.PROXIED_STAGING_DATABASE_URL }}
          ZERO_UPSTREAM_DB: ${{ secrets.PROXIED_STAGING_DATABASE_URL }}
          ZERO_REPLICA_FILE: /tmp/sync-replica.db
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          E2E_BASE_URL: 'https://staging.belcoda.com'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Post test report to PR
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/ctrf-report.json'
          pull-request-report: true
          failed-report: true
          flaky-report: true
          pull-request: true
          overwrite-comment: true
          comment-tag: 'e2e-results'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
