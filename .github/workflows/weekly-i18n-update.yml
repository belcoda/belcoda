name: Weekly i18n update

on:
  schedule:
    # JST Monday 4:00 = Sunday 19:00 UTC
    - cron: '0 19 * * 0'
  workflow_dispatch: # manual trigger

jobs:
  update-translations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Clean unused locale keys
        run: npm run wuchale:clean

      - name: Extract locale keys (with translation)
        run: npm run wuchale:extract

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): weekly translation update'
          branch: i18n-weekly-update
          title: 'Weekly i18n update'
          body: 'This PR updates missing translations automatically.'
          base: develop
          labels: automation,i18n

      - name: Auto-merge PR if CI passes
        if: steps.pr.outputs.pull-request-number
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          pull-request: ${{ steps.pr.outputs.pull-request-number }}
